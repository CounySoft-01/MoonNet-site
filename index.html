<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoonNet - Лучший Minecraft сервер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: white; 
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 50px 0; }
        .server-ip { 
            background: rgba(0,255,136,0.1); 
            border: 2px solid #00ff88; 
            border-radius: 15px; 
            padding: 30px; 
            margin: 30px 0;
            font-size: 2.5em; 
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 50px 0; }
        .feature { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; text-align: center; }
        .discord-btn { display: inline-block; background: #5865F2; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌙 MoonNet</h1>
            <p>Лучший Minecraft сервер 2026</p>
        </div>
        
        <div class="server-ip">
            MoonNet.mooo.com
        </div>
        
        <div class="features">
            <div class="feature">
                <h3>🎮 Кастом плагины</h3>
                <p>ItemKeeper, DeluxeMenus, уникальные сферы</p>
            </div>
            <div class="feature">
                <h3>⚡ 1.21.1 Paper</h3>
                <p>Высокий онлайн, низкий пинг</p>
            </div>
            <div class="feature">
                <h3>🛡️ Античит</h3>
                <p>Честная игра для всех</p>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="https://discord.gg/YOUR_DISCORD" class="discord-btn">Присоединиться в Discord</a>
        </div>
    </div>
</body>
</html>
